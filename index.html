
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Text Morph</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}
canvas{
    display:block;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
let mouse = { x: null, y: null, radius: 120 };

window.addEventListener("mousemove", e=>{
    mouse.x = e.x;
    mouse.y = e.y;
});

window.addEventListener("resize", ()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    init(currentText);
});

class Particle{
    constructor(x,y){
        this.x = Math.random()*canvas.width;
        this.y = Math.random()*canvas.height;
        this.baseX = x;
        this.baseY = y;
        this.size = 2;
        this.density = Math.random()*30;
    }

    draw(){
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();
    }

    update(){
        let dx = mouse.x - this.x;
        let dy = mouse.y - this.y;
        let distance = Math.sqrt(dx*dx + dy*dy);

        if(distance < mouse.radius){
            let force = (mouse.radius - distance)/mouse.radius;
            let dirX = dx/distance;
            let dirY = dy/distance;
            this.x -= dirX * force * this.density;
            this.y -= dirY * force * this.density;
        } else {
            // Smooth return to base position
            this.x += (this.baseX - this.x)*0.05;
            this.y += (this.baseY - this.y)*0.05;
        }
    }
}

let currentText = "HELLO";

function init(text){
    particles = [];
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "white";
    ctx.font = "bold 150px Arial";
    ctx.textAlign = "center";
    ctx.fillText(text, canvas.width/2, canvas.height/2);

    const textData = ctx.getImageData(0,0,canvas.width,canvas.height);

    for(let y=0; y<canvas.height; y+=6){
        for(let x=0; x<canvas.width; x+=6){
            const index = (y*4*canvas.width)+(x*4);
            if(textData.data[index+3] > 128){
                particles.push(new Particle(x,y));
            }
        }
    }
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
        p.update();
        p.draw();
    });
    requestAnimationFrame(animate);
}

init(currentText);
animate();


// Morph text every 3 seconds
const words = ["HELLO","GITHUB","PORTFOLIO","ANIMATION"];
let wordIndex = 0;

setInterval(()=>{
    wordIndex = (wordIndex+1)%words.length;
    currentText = words[wordIndex];
    init(currentText);
},3000);

</script>

</body>
</html>
